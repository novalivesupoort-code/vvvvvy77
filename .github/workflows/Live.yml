name: 🔴 Live Stream - Pro Edition

on:
  workflow_dispatch:
    inputs:
      stream_url:
        description: '🔗 رابط البث (M3U8 / TS / EXTINF / ok.ru / أي رابط)'
        required: true
        type: string
      quality:
        description: '📺 جودة البث'
        required: false
        default: 'best'
        type: choice
        options:
          - best
          - 1080p
          - 720p
          - 480p
          - worst
      video_bitrate:
        description: '📊 معدل البث (kbps)'
        required: false
        default: '4500'
        type: string
      enable_logo:
        description: '🖼️ تفعيل اللوغو'
        required: false
        default: 'true'
        type: boolean

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: 📦 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Install Dependencies
        run: |
          printf '\033[1;36m━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\033[0m\n'
          printf '\033[1;36m   ⚙️  تثبيت المكتبات المطلوبة\033[0m\n'
          printf '\033[1;36m━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\033[0m\n'
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg python3-pip curl wget
          pip3 install streamlink --break-system-packages --quiet
          printf '\033[1;32m✅ FFmpeg: \033[0m'; ffmpeg -version | head -1
          printf '\033[1;32m✅ Streamlink: \033[0m'; streamlink --version

      - name: 🔍 Detect URL Type & Start Stream
        env:
          RTMP_URL: "rtmp://stream.soop.live/app/iaj28euhs-813204288"
        run: |
          RED='\033[1;31m'
          GREEN='\033[1;32m'
          YELLOW='\033[1;33m'
          BLUE='\033[1;34m'
          PURPLE='\033[1;35m'
          CYAN='\033[1;36m'
          WHITE='\033[1;37m'
          ORANGE='\033[0;33m'
          RESET='\033[0m'
          BOLD='\033[1m'

          banner() {
            printf "${CYAN}━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━${RESET}\n"
            printf "${WHITE}   $1${RESET}\n"
            printf "${CYAN}━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━${RESET}\n"
          }

          log_info()    { echo -e "${BLUE}[ℹ️ INFO ]${RESET} $1"; }
          log_ok()      { echo -e "${GREEN}[✅ OK   ]${RESET} $1"; }
          log_warn()    { echo -e "${YELLOW}[⚠️ WARN ]${RESET} $1"; }
          log_error()   { echo -e "${RED}[❌ ERROR]${RESET} $1"; }
          log_stream()  { echo -e "${PURPLE}[📡 LIVE ]${RESET} $1"; }
          log_retry()   { echo -e "${ORANGE}[🔄 RETRY]${RESET} $1"; }

          RAW_URL="${{ github.event.inputs.stream_url }}"
          QUALITY="${{ github.event.inputs.quality }}"
          VIDEO_BR="${{ github.event.inputs.video_bitrate }}"
          ENABLE_LOGO="${{ github.event.inputs.enable_logo }}"
          FAIL_COUNT=0
          MAX_FAILS=10
          URL_TYPE="unknown"
          FINAL_URL=""

          banner "🔴 Pro Live Stream | بدء البث المباشر"
          log_info "الرابط الأصلي: ${RAW_URL}"
          log_info "الجودة: ${QUALITY} | معدل الفيديو: ${VIDEO_BR}k"

          extract_from_extinf() {
            local input="$1"
            if echo "$input" | grep -q "^#EXTINF"; then
              FINAL_URL=$(echo "$input" | grep -v "^#" | grep -v "^$" | head -1)
              URL_TYPE="extinf"
            else
              FINAL_URL="$input"
            fi
          }

          resolve_relative_url() {
            local url="$1"
            local base="$2"
            if echo "$url" | grep -qE "^https?://"; then
              echo "$url"
            else
              base_dir=$(echo "$base" | sed 's|/[^/]*$||')
              if echo "$url" | grep -q "^/"; then
                proto=$(echo "$base" | grep -oE "^https?://[^/]+")
                echo "${proto}${url}"
              else
                echo "${base_dir}/${url}"
              fi
            fi
          }

          banner "🔍 كشف نوع الرابط"

          if echo "$RAW_URL" | grep -q "^#EXTINF"; then
            log_info "تم اكتشاف: سطر EXTINF"
            extract_from_extinf "$RAW_URL"
            URL_TYPE="extinf"

          elif echo "$RAW_URL" | grep -qiE "^rtmp://|^rtmps://"; then
            log_info "تم اكتشاف: بث RTMP مباشر"
            FINAL_URL="$RAW_URL"
            URL_TYPE="rtmp_input"

          elif ! echo "$RAW_URL" | grep -qiE "^https?://|^rtmps?://"; then
            log_warn "رابط نسبي - سيتم المعالجة كـ M3U8"
            FINAL_URL="$RAW_URL"
            URL_TYPE="relative"

          elif echo "$RAW_URL" | grep -qiE "ok\\.ru|youtube\\.com|youtu\\.be|twitch\\.tv|dailymotion\\.com|vimeo\\.com"; then
            log_info "تم اكتشاف: رابط موقع مشهور"
            FINAL_URL="$RAW_URL"
            URL_TYPE="site"

          elif echo "$RAW_URL" | grep -qiE "\\.ts(\?.*)?$"; then
            log_info "تم اكتشاف: ملف TS مباشر"
            FINAL_URL="$RAW_URL"
            URL_TYPE="ts_direct"

          elif echo "$RAW_URL" | grep -qiE "\\.m3u8?(\?.*)?$|/m3u8|playlist\\.m3u"; then
            log_info "تم اكتشاف: قائمة M3U8"
            FINAL_URL="$RAW_URL"
            URL_TYPE="m3u8"

          else
            log_info "تم اكتشاف: رابط HTTP عام - سيتم الكشف التلقائي"
            FINAL_URL="$RAW_URL"

            CONTENT_TYPE=$(curl -sI --max-time 10 "$RAW_URL" 2>/dev/null | grep -i "content-type" | head -1 || echo "")
            if echo "$CONTENT_TYPE" | grep -qi "mpegurl\|m3u"; then
              URL_TYPE="m3u8"
            elif echo "$CONTENT_TYPE" | grep -qi "video\|octet-stream"; then
              URL_TYPE="ts_direct"
            else
              URL_TYPE="auto"
            fi
          fi

          log_ok "نوع الرابط: ${BOLD}${URL_TYPE}${RESET}"
          log_ok "الرابط النهائي: ${FINAL_URL}"

          LOGO_OK="false"
          if [ "$ENABLE_LOGO" = "true" ] && [ -f "logo.png" ]; then
            log_ok "اللوغو موجود ✓ (logo.png - 1920x1080)"
            LOGO_OK="true"
          elif [ "$ENABLE_LOGO" = "true" ] && [ -f "logoworld.png" ]; then
            log_ok "اللوغو موجود ✓ (logoworld.png)"
            LOGO_OK="true"
            cp logoworld.png logo.png
          elif [ "$ENABLE_LOGO" = "true" ]; then
            log_warn "ملف اللوغو غير موجود - سيتم البث بدون لوغو"
            ENABLE_LOGO="false"
          fi

          if [ "$LOGO_OK" = "true" ]; then
            VIDEO_FILTER="[1:v][0:v]scale2ref[logo_sized][vid];[logo_sized]colorkey=black:0.15:0.05[logo];[vid]setsar=1[vid2];[vid2][logo]overlay=0:0,format=yuv420p[out]"
          else
            VIDEO_FILTER="[0:v]setsar=1,format=yuv420p[out]"
          fi

          MAX_RATE=$(( VIDEO_BR + 500 ))
          BUF_SIZE=$(( VIDEO_BR * 2 ))

          do_stream() {
            local url="$1"
            local type="$2"

            case "$type" in

              "m3u8"|"extinf"|"site"|"auto")
                banner "📡 بدء البث عبر Streamlink"
                log_stream "الرابط: $url"

                if [ "$LOGO_OK" = "true" ]; then
                  streamlink --stdout --loglevel warning \
                    --hls-live-restart \
                    --stream-segment-threads 4 \
                    --stream-timeout 60 \
                    --retry-streams 1 --retry-max 1 --retry-open 1 \
                    --http-header "User-Agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
                    --http-header "Referer=https://www.google.com/" \
                    "$url" "$QUALITY" 2>/tmp/sl_err | \
                  ffmpeg \
                    -hide_banner -loglevel warning -nostdin \
                    -thread_queue_size 65536 \
                    -f mpegts -i pipe:0 \
                    -i "logo.png" \
                    -filter_complex "$VIDEO_FILTER" \
                    -map "[out]" -map 0:a \
                    $(ffmpeg_video_args) \
                    -f flv "$RTMP_URL"
                  SL_EXIT=${PIPESTATUS[0]}
                else
                  streamlink --stdout --loglevel warning \
                    --hls-live-restart \
                    --stream-segment-threads 4 \
                    --stream-timeout 60 \
                    --retry-streams 1 --retry-max 1 --retry-open 1 \
                    --http-header "User-Agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
                    --http-header "Referer=https://www.google.com/" \
                    "$url" "$QUALITY" 2>/tmp/sl_err | \
                  ffmpeg \
                    -hide_banner -loglevel warning -nostdin \
                    -thread_queue_size 65536 \
                    -f mpegts -i pipe:0 \
                    -filter_complex "$VIDEO_FILTER" \
                    -map "[out]" -map 0:a \
                    $(ffmpeg_video_args) \
                    -f flv "$RTMP_URL"
                  SL_EXIT=${PIPESTATUS[0]}
                fi

                if [ $SL_EXIT -ne 0 ]; then
                  log_warn "streamlink فشل (403/blocked) → تجربة ffmpeg مباشرة..."
                  UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
                  if [ "$LOGO_OK" = "true" ]; then
                    ffmpeg \
                      -hide_banner -loglevel warning -nostdin \
                      -user_agent "$UA" \
                      -headers "Referer: https://www.google.com/\r\n" \
                      -reconnect 1 -reconnect_at_eof 1 -reconnect_streamed 1 \
                      -reconnect_delay_max 5 \
                      -thread_queue_size 65536 \
                      -i "$url" \
                      -i "logo.png" \
                      -filter_complex "$VIDEO_FILTER" \
                      -map "[out]" -map 0:a \
                      $(ffmpeg_video_args) \
                      -f flv "$RTMP_URL"
                  else
                    ffmpeg \
                      -hide_banner -loglevel warning -nostdin \
                      -user_agent "$UA" \
                      -headers "Referer: https://www.google.com/\r\n" \
                      -reconnect 1 -reconnect_at_eof 1 -reconnect_streamed 1 \
                      -reconnect_delay_max 5 \
                      -thread_queue_size 65536 \
                      -i "$url" \
                      -filter_complex "$VIDEO_FILTER" \
                      -map "[out]" -map 0:a \
                      $(ffmpeg_video_args) \
                      -f flv "$RTMP_URL"
                  fi
                fi
                ;;

              "ts_direct"|"relative")
                banner "📡 بدء البث المباشر عبر FFmpeg"
                log_stream "الرابط: $url"

                if [ "$LOGO_OK" = "true" ]; then
                  ffmpeg \
                    -hide_banner -loglevel warning -nostdin \
                    -thread_queue_size 65536 \
                    -re -i "$url" \
                    -i "logo.png" \
                    -filter_complex "$VIDEO_FILTER" \
                    -map "[out]" -map 0:a \
                    $(ffmpeg_video_args) \
                    -f flv "$RTMP_URL"
                else
                  ffmpeg \
                    -hide_banner -loglevel warning -nostdin \
                    -thread_queue_size 65536 \
                    -re -i "$url" \
                    -filter_complex "$VIDEO_FILTER" \
                    -map "[out]" -map 0:a \
                    $(ffmpeg_video_args) \
                    -f flv "$RTMP_URL"
                fi
                ;;

              "rtmp_input")
                banner "📡 إعادة بث RTMP"
                log_stream "المصدر: $url → الهدف: $RTMP_URL"

                ffmpeg \
                  -hide_banner -loglevel warning -nostdin \
                  -thread_queue_size 65536 \
                  -i "$url" \
                  -c copy \
                  -f flv "$RTMP_URL"
                ;;

              *)
                log_warn "نوع غير معروف، سيتم تجربة Streamlink أولاً..."
                streamlink --stdout --loglevel warning \
                  "$url" "$QUALITY" \
                | ffmpeg \
                  -hide_banner -loglevel warning -nostdin \
                  -thread_queue_size 65536 \
                  -re -i pipe:0 \
                  -filter_complex "$VIDEO_FILTER" \
                  -map "[out]" -map 0:a \
                  $(ffmpeg_video_args) \
                  -f flv "$RTMP_URL"
                ;;
            esac
          }

          ffmpeg_video_args() {
            echo "-fflags +genpts+discardcorrupt \
              -c:v libx264 \
              -preset veryfast \
              -tune zerolatency \
              -profile:v main \
              -b:v ${VIDEO_BR}k \
              -maxrate ${MAX_RATE}k \
              -bufsize ${BUF_SIZE}k \
              -g 48 \
              -keyint_min 48 \
              -sc_threshold 0 \
              -c:a aac \
              -b:a 128k \
              -ar 44100 \
              -ac 2 \
              -avoid_negative_ts make_zero \
              -max_interleave_delta 0 \
              -flvflags no_duration_filesize"
          }

          banner "🔴 البث المباشر يبدأ الآن"
          ATTEMPT=0

          while true; do
            ATTEMPT=$((ATTEMPT + 1))
            printf "\n"
            banner "▶ محاولة رقم: ${ATTEMPT} | النوع: ${URL_TYPE}"
            log_stream "الوقت: $(date '+%Y-%m-%d %H:%M:%S UTC')"

            do_stream "$FINAL_URL" "$URL_TYPE"
            EXIT_CODE=$?

            if [ $EXIT_CODE -eq 0 ]; then
              log_ok "انتهى البث بشكل طبيعي ✅"
              break
            fi

            log_warn "انقطع البث (كود: ${EXIT_CODE}) — إعادة المحاولة خلال 5 ثوانٍ..."
            sleep 5
          done

          banner "✅ انتهى البث بنجاح"
