name: 🎬 Smart Stream

on:
  workflow_dispatch:
    inputs:
      m3u8_url:
        description: '📡 رابط البث M3U8'
        required: true
        type: string
      rtmp_url:
        description: '🎯 رابط RTMP'
        required: true
        type: string
      stream_mode:
        description: '⚙️ نوع البث (copy = نقل سريع / transcode = مع خيارات)'
        required: true
        type: choice
        options:
          - copy
          - transcode
      enable_logo:
        description: '🖼️ تفعيل اللوغو (transcode فقط)'
        required: false
        type: choice
        options:
          - 'no'
          - 'yes'
      logo_file:
        description: '🖼️ اختر اللوغو (transcode فقط)'
        required: false
        type: choice
        options:
          - logo1.png
          - logo2.png
          - logo3.png
      logo_position:
        description: '📍 موضع اللوغو (transcode فقط)'
        required: false
        type: choice
        options:
          - bottom-left
          - bottom-right
          - top-left
          - top-right
          - center
      logo_size:
        description: '📐 حجم اللوغو بالبكسل (transcode فقط)'
        required: false
        default: '115'
        type: string
      video_bitrate:
        description: '🎥 جودة الفيديو (transcode فقط)'
        required: false
        type: choice
        options:
          - 4500k
          - 3000k
          - 2000k
          - 6000k
          - 8000k
      audio_bitrate:
        description: '🔊 جودة الصوت (transcode فقط)'
        required: false
        type: choice
        options:
          - 128k
          - 64k
          - 192k
          - 256k
      preset:
        description: '⚡ سرعة الترميز (transcode فقط)'
        required: false
        type: choice
        options:
          - veryfast
          - ultrafast
          - fast
          - medium

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Cache FFmpeg
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: /usr/bin/ffmpeg
          key: ${{ runner.os }}-ffmpeg-apt

      - name: Install FFmpeg
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-streamlink

      - name: Install Streamlink
        run: |
          pip3 install streamlink --break-system-packages -q
          echo "✅ FFmpeg: $(ffmpeg -version 2>&1 | head -1)"
          echo "✅ Streamlink: $(streamlink --version)"

      - name: Prepare Logo
        if: >
          github.event.inputs.stream_mode == 'transcode' &&
          github.event.inputs.enable_logo == 'yes'
        run: |
          LOGO_FILE="${{ github.event.inputs.logo_file }}"
          if [ -f "logos/$LOGO_FILE" ]; then
            cp "logos/$LOGO_FILE" /tmp/logo.png
            echo "✅ Logo: $LOGO_FILE"
          else
            echo "❌ Logo not found: logos/$LOGO_FILE"
            exit 1
          fi

      - name: Start Stream - Copy
        if: github.event.inputs.stream_mode == 'copy'
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "⚡ Mode: COPY — نقل مباشر بدون معالجة"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          FAIL_COUNT=0
          MAX_FAILS=10

          while [ $FAIL_COUNT -lt $MAX_FAILS ]; do
            echo "▶ Attempt: $((FAIL_COUNT + 1))"

            streamlink \
              --stdout --loglevel warning \
              --hls-live-restart \
              --stream-segment-threads 3 \
              --stream-timeout 60 \
              --retry-streams 5 --retry-max 10 \
              "${{ github.event.inputs.m3u8_url }}" best \
            | ffmpeg \
              -hide_banner -loglevel warning -nostdin \
              -thread_queue_size 65536 \
              -f mpegts \
              -i pipe:0 \
              -c:v copy -c:a copy \
              -f flv "${{ github.event.inputs.rtmp_url }}"

            EXIT_CODE=$?
            [ $EXIT_CODE -eq 0 ] && echo "✅ Done." && break
            FAIL_COUNT=$((FAIL_COUNT + 1))
            WAIT=$((FAIL_COUNT * 3)); [ $WAIT -gt 30 ] && WAIT=30
            echo "🔄 Retry in ${WAIT}s..."
            sleep $WAIT
          done

          [ $FAIL_COUNT -ge $MAX_FAILS ] && echo "❌ Max fails reached." && exit 1

      - name: Start Stream - Transcode
        if: github.event.inputs.stream_mode == 'transcode'
        run: |
          ENABLE_LOGO="${{ github.event.inputs.enable_logo }}"
          LOGO_SIZE="${{ github.event.inputs.logo_size }}"
          LOGO_POS="${{ github.event.inputs.logo_position }}"
          VBITRATE="${{ github.event.inputs.video_bitrate }}"
          ABITRATE="${{ github.event.inputs.audio_bitrate }}"
          PRESET="${{ github.event.inputs.preset }}"

          [ -z "$LOGO_SIZE" ]  && LOGO_SIZE="115"
          [ -z "$LOGO_POS" ]   && LOGO_POS="bottom-left"
          [ -z "$VBITRATE" ]   && VBITRATE="4500k"
          [ -z "$ABITRATE" ]   && ABITRATE="128k"
          [ -z "$PRESET" ]     && PRESET="veryfast"

          case "$LOGO_POS" in
            bottom-left)  OVERLAY="30:main_h-overlay_h-30" ;;
            bottom-right) OVERLAY="main_w-overlay_w-30:main_h-overlay_h-30" ;;
            top-left)     OVERLAY="30:30" ;;
            top-right)    OVERLAY="main_w-overlay_w-30:30" ;;
            center)       OVERLAY="(main_w-overlay_w)/2:(main_h-overlay_h)/2" ;;
            *)            OVERLAY="30:main_h-overlay_h-30" ;;
          esac

          MAXRATE=$(echo "$VBITRATE" | sed 's/k//' | awk '{printf "%dk", $1 * 1.1}')
          BUFSIZE=$(echo "$VBITRATE" | sed 's/k//' | awk '{printf "%dk", $1 * 2}')

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🎬 Mode  : TRANSCODE"
          echo "🖼️  Logo  : $ENABLE_LOGO | ${LOGO_SIZE}px | $LOGO_POS"
          echo "🎥 Video : $VBITRATE | Preset: $PRESET"
          echo "🔊 Audio : $ABITRATE"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          FAIL_COUNT=0
          MAX_FAILS=10

          while [ $FAIL_COUNT -lt $MAX_FAILS ]; do
            echo "▶ Attempt: $((FAIL_COUNT + 1))"

            if [ "$ENABLE_LOGO" = "yes" ]; then
              streamlink \
                --stdout --loglevel warning \
                --hls-live-restart \
                --stream-segment-threads 3 \
                --stream-timeout 60 \
                --retry-streams 5 --retry-max 10 \
                "${{ github.event.inputs.m3u8_url }}" best \
              | ffmpeg \
                -hide_banner -loglevel warning -nostdin \
                -thread_queue_size 65536 \
                -f mpegts \
                -i pipe:0 -i /tmp/logo.png \
                -filter_complex \
                  "[1:v]scale=${LOGO_SIZE}:-1:flags=lanczos[logo];
                   [0:v][logo]overlay=${OVERLAY}:format=auto,format=yuv420p,setsar=1" \
                -c:v libx264 -preset "$PRESET" -tune zerolatency \
                -profile:v high \
                -b:v "$VBITRATE" -maxrate "$MAXRATE" -bufsize "$BUFSIZE" \
                -g 50 -keyint_min 25 \
                -c:a aac -b:a "$ABITRATE" -ar 44100 -ac 2 \
                -f flv "${{ github.event.inputs.rtmp_url }}"
            else
              streamlink \
                --stdout --loglevel warning \
                --hls-live-restart \
                --stream-segment-threads 3 \
                --stream-timeout 60 \
                --retry-streams 5 --retry-max 10 \
                "${{ github.event.inputs.m3u8_url }}" best \
              | ffmpeg \
                -hide_banner -loglevel warning -nostdin \
                -thread_queue_size 65536 \
                -f mpegts \
                -i pipe:0 \
                -c:v libx264 -preset "$PRESET" -tune zerolatency \
                -profile:v high \
                -b:v "$VBITRATE" -maxrate "$MAXRATE" -bufsize "$BUFSIZE" \
                -g 50 -keyint_min 25 \
                -c:a aac -b:a "$ABITRATE" -ar 44100 -ac 2 \
                -f flv "${{ github.event.inputs.rtmp_url }}"
            fi

            EXIT_CODE=$?
            [ $EXIT_CODE -eq 0 ] && echo "✅ Done." && break
            FAIL_COUNT=$((FAIL_COUNT + 1))
            WAIT=$((FAIL_COUNT * 3)); [ $WAIT -gt 30 ] && WAIT=30
            echo "🔄 Retry in ${WAIT}s..."
            sleep $WAIT
          done

          [ $FAIL_COUNT -ge $MAX_FAILS ] && echo "❌ Max fails reached." && exit 1
