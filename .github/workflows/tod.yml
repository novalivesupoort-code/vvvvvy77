name: Stream

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Latest FFmpeg (7.x)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y wget xz-utils
          wget -q https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz
          tar -xf ffmpeg-master-latest-linux64-gpl.tar.xz
          sudo mv ffmpeg-master-latest-linux64-gpl/bin/ffmpeg /usr/local/bin/ffmpeg
          sudo chmod +x /usr/local/bin/ffmpeg
          ffmpeg -version

      - name: Start Stream
        run: |
          ffmpeg \
            -user_agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -fflags +genpts+discardcorrupt+nobuffer \
            -flags +low_delay \
            -live_start_index -3 \
            -seg_duration 3 \
            -c:v hevc \
            -i "http://foxtv7.com/newtest/TVD4021/index.mpd" \
            -map 0:v:0 -map 0:a:1 \
            -vf "setpts=N/FRAME_RATE/TB" \
            -c:v libx264 -pix_fmt yuv420p -preset ultrafast -tune zerolatency \
            -b:v 4000k -maxrate 4500k -bufsize 9000k \
            -g 50 -keyint_min 50 -sc_threshold 0 \
            -af "aresample=48000:async=1000:first_pts=0,asetpts=N/SR/TB" \
            -c:a aac -b:a 128k -ar 48000 \
            -ac 2 \
            -avoid_negative_ts make_zero \
            -copyts \
            -start_at_zero \
            -max_muxing_queue_size 2048 \
            -reconnect 1 -reconnect_at_eof 1 -reconnect_streamed 1 -reconnect_delay_max 2 \
            -f flv "rtmp://platform.topuphost.com:8577/live/TESTAYHAM4K"
