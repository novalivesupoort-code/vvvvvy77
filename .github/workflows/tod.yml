name: Kick Stream - Fast Start

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Start Stream Immediately
        run: |
          ffmpeg -re -timeout 10000000 -i "http://45.67.136.25/3HfHLrEmIZ/caMjeGs0i3/342993?" \
          -i "logo.png" -filter_complex \
          "[1:v]scale=iw*0.05:-1[logo];[0:v]eq=brightness=0.03:contrast=1.03:saturation=1.12[video];[video][logo]overlay=30:H-h-30" \
          -vcodec libx264 -preset fast -profile:v high -level 4.1 -pix_fmt yuv420p -g 50 \
          -b:v 5500k -maxrate 6000k -bufsize 1200k \
          -acodec copy -map_metadata -1 \
          -f flv "rtmps://fa723fc1b171.global-contribute.live-video.net/app/sk_us-west-2_LaBpq1zvOoGp_dNaI2aVsrGV4jhzjcuurJAwq7XjtHi"

