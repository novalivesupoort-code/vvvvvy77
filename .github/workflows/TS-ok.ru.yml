name: Ok.ru TS Stream - Native TS

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg curl
          ffmpeg -version | head -1

      - name: Start Stream
        run: |
          RTMP_URL="rtmp://vsu.okcdn.ru/input/14627505512044_15347102124652_nyms3w6t7u"
          M3U8_URL="http://off28.lynxcontents.click:2086/live/171348492752/5S6HGsea3j/254746.m3u8?data=ixVd16Dy31bufAE7xi0trlZf-D3RV-4rJfyGGIQQA7M5fK_L8c97e4K6rDkXy_UamF3AZ0ezGAqmT6jVBnYskDPHdGw4W9AlDudpS8MKl0QneEDVUSl6hQ6Zg3ri6u9ppg3suI5o4tSV9Z5PhcRLfQ%3D%3D&expires=1781485860"

          if [ ! -f "logoworld.png" ]; then
            echo "❌ Logo file not found!"
            exit 1
          fi

          FAIL_COUNT=0
          MAX_FAILS=10
          LAST_SEQ=0

          stream_segment() {
            local TS_URL=$1
            echo "📡 Streaming: $TS_URL"
            ffmpeg \
              -hide_banner \
              -loglevel error \
              -reconnect 1 \
              -reconnect_delay_max 5 \
              -i "$TS_URL" \
              -i "logoworld.png" \
              -filter_complex \
                "[1:v]scale=115:-1:flags=lanczos[logo];
                 [0:v][logo]overlay=30:main_h-overlay_h-30:format=auto,format=yuv420p,setsar=1" \
              -c:v libx264 \
              -preset veryfast \
              -tune zerolatency \
              -profile:v high \
              -crf 20 \
              -b:v 4500k \
              -maxrate 5000k \
              -bufsize 9000k \
              -g 50 \
              -keyint_min 25 \
              -c:a aac \
              -b:a 128k \
              -ar 44100 \
              -ac 2 \
              -f flv \
              "$RTMP_URL"
          }

          while [ $FAIL_COUNT -lt $MAX_FAILS ]; do
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "▶ Fetching playlist | Attempt: $((FAIL_COUNT + 1))"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            # جلب البلايلست
            PLAYLIST=$(curl -s --max-time 10 "$M3U8_URL")

            if [ -z "$PLAYLIST" ]; then
              echo "❌ Failed to fetch playlist"
              FAIL_COUNT=$((FAIL_COUNT + 1))
              sleep 5
              continue
            fi

            # استخراج رقم التسلسل
            SEQ=$(echo "$PLAYLIST" | grep "EXT-X-MEDIA-SEQUENCE" | grep -o '[0-9]*')
            echo "📋 Sequence: $SEQ"

            # استخراج روابط TS
            TS_URLS=$(echo "$PLAYLIST" | grep "\.ts")

            while IFS= read -r TS_URL; do
              if [ -z "$TS_URL" ]; then continue; fi

              # استخراج رقم الـ segment
              SEG_NUM=$(echo "$TS_URL" | grep -o '[0-9]*\.ts' | grep -o '[0-9]*')

              # تخطي القديمة
              if [ "$SEG_NUM" -le "$LAST_SEQ" ] 2>/dev/null; then
                echo "⏭ Skip segment $SEG_NUM"
                continue
              fi

              LAST_SEQ=$SEG_NUM
              stream_segment "$TS_URL"
              EXIT_CODE=$?

              if [ $EXIT_CODE -ne 0 ]; then
                echo "⚠ Segment failed: $EXIT_CODE"
                FAIL_COUNT=$((FAIL_COUNT + 1))
              else
                FAIL_COUNT=0
              fi

            done <<< "$TS_URLS"

            sleep 2

          done

          if [ $FAIL_COUNT -ge $MAX_FAILS ]; then
            echo "❌ Max reconnect attempts reached."
            exit 1
          fi
