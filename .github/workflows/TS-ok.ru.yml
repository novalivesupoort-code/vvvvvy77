name: Ok.ru TS Stream - Final

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg curl python3
          ffmpeg -version | head -1

      - name: Start MIME Proxy
        run: |
          cat > /tmp/proxy.py << 'EOF'
          import http.server
          import urllib.request
          import urllib.parse
          import sys

          class ProxyHandler(http.server.BaseHTTPRequestHandler):
              def log_message(self, format, *args):
                  pass  # suppress logs

              def do_GET(self):
                  target = urllib.parse.unquote(self.path.lstrip('/'))
                  if not target.startswith('http'):
                      target = 'http:/' + target

                  try:
                      req = urllib.request.Request(target, headers={'User-Agent': 'Mozilla/5.0'})
                      with urllib.request.urlopen(req, timeout=15) as resp:
                          data = resp.read()

                      if target.endswith('.m3u8') or '.m3u8?' in target:
                          self.send_response(200)
                          self.send_header('Content-Type', 'application/vnd.apple.mpegurl')
                      else:
                          self.send_response(200)
                          self.send_header('Content-Type', 'video/mp2t')

                      self.send_header('Content-Length', str(len(data)))
                      self.end_headers()
                      self.wfile.write(data)
                  except Exception as e:
                      self.send_response(502)
                      self.end_headers()

          server = http.server.HTTPServer(('127.0.0.1', 8888), ProxyHandler)
          server.serve_forever()
          EOF
          python3 /tmp/proxy.py &
          echo "🔀 Proxy PID: $!"
          sleep 2
          echo "✅ Proxy running on port 8888"

      - name: Start Stream
        run: |
          RTMP_URL="rtmp://vsu.okcdn.ru/input/14627505512044_15347102124652_nyms3w6t7u"
          RAW_URL="http://off28.lynxcontents.click:2086/live/171348492752/5S6HGsea3j/254746.m3u8?data=ixVd16Dy31bufAE7xi0trlZf-D3RV-4rJfyGGIQQA7M5fK_L8c97e4K6rDkXy_UamF3AZ0ezGAqmT6jVBnYskDPHdGw4W9AlDudpS8MKl0QneEDVUSl6hQ6Zg3ri6u9ppg3suI5o4tSV9Z5PhcRLfQ%3D%3D&expires=1781485860"
          SOURCE_URL="http://127.0.0.1:8888/$(python3 -c "import urllib.parse; print(urllib.parse.quote('$RAW_URL', safe=''))")"

          if [ ! -f "logoworld.png" ]; then
            echo "❌ Logo file not found!"
            exit 1
          fi

          FAIL_COUNT=0
          MAX_FAILS=10

          while [ $FAIL_COUNT -lt $MAX_FAILS ]; do
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "▶ Starting stream | Attempt: $((FAIL_COUNT + 1))"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            ffmpeg \
              -hide_banner \
              -loglevel warning \
              -stats \
              -nostdin \
              -reconnect 1 \
              -reconnect_at_eof 1 \
              -reconnect_streamed 1 \
              -reconnect_delay_max 5 \
              -i "$SOURCE_URL" \
              -i "logoworld.png" \
              -filter_complex \
                "[1:v]scale=115:-1:flags=lanczos[logo];
                 [0:v][logo]overlay=30:main_h-overlay_h-30:format=auto,format=yuv420p,setsar=1" \
              -c:v libx264 \
              -preset veryfast \
              -tune zerolatency \
              -profile:v high \
              -crf 20 \
              -b:v 4500k \
              -maxrate 5000k \
              -bufsize 9000k \
              -g 50 \
              -keyint_min 25 \
              -c:a aac \
              -b:a 128k \
              -ar 44100 \
              -ac 2 \
              -f flv \
              "$RTMP_URL"

            EXIT_CODE=$?
            echo "⚠ FFmpeg exited: $EXIT_CODE"

            if [ $EXIT_CODE -eq 0 ]; then
              echo "✅ Stream ended cleanly."
              break
            fi

            FAIL_COUNT=$((FAIL_COUNT + 1))
            WAIT=$((FAIL_COUNT * 3))
            [ $WAIT -gt 30 ] && WAIT=30
            echo "🔄 Retry in ${WAIT}s..."
            sleep $WAIT
          done
