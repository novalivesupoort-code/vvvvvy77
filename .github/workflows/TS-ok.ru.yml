name: Ok.ru TS Stream - Native TS

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest

    env:
      FORCE_JUST_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Start Native 1080p Stream
        run: |
          while true; do
            echo "Starting native 1080p stream with OK.ru optimized audio..."
            
            ffmpeg -re -hide_banner -loglevel error \
            -reconnect 1 -reconnect_at_eof 1 -reconnect_streamed 1 -reconnect_delay_max 5 \
            -i "http://off6.lynxcontents.click:2086/live/206923845871/mI45UxamwN/255946.m3u8?data=s20NH37eYYxIyYkfVf-wfNYt512-3tA2bHsbQMCJ-3KZTF7ezkDqUAmqWvMHjW3-vmYez2NU81uztyr43Uc3GyIMkuac1_iKWmUB11eVWMZwVrXC9UIDca_znRmlEeAkz8tjyd79xcJYF91fhWEavA%3D%3D&expires=1779145528" \
            -i "logoworld.png" \
            -filter_complex \
            "[1:v]scale=iw*0.10:-1[logo]; \
             [0:v]eq=brightness=0.04:contrast=1.12:saturation=1.30[video]; \
             [video][logo]overlay=30:main_h-overlay_h-30:format=auto,format=yuv420p" \
            -vcodec libx264 -preset veryfast -crf 18 -tune zerolatency -g 50 \
            -b:v 5000k -maxrate 5500k -bufsize 11000k \
            -acodec aac -b:a 128k -ar 44100 -async 1 \
            -f flv "rtmp://vsu.okcdn.ru/input/14627505512044_15347102124652_nyms3w6t7u"
            
            echo "Stream interrupted. Reconnecting in 5 seconds..."
            sleep 5
          done

