name: Ok.ru TS Stream - 5H Stable

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg curl
          ffmpeg -version | head -1

      - name: Start Stream
        run: |
          RTMP_URL="rtmp://vsu.okcdn.ru/input/14627505512044_15347102124652_nyms3w6t7u"
          M3U8_URL="http://off28.lynxcontents.click:2086/live/171348492752/5S6HGsea3j/254746.m3u8?data=ixVd16Dy31bufAE7xi0trlZf-D3RV-4rJfyGGIQQA7M5fK_L8c97e4K6rDkXy_UamF3AZ0ezGAqmT6jVBnYskDPHdGw4W9AlDudpS8MKl0QneEDVUSl6hQ6Zg3ri6u9ppg3suI5o4tSV9Z5PhcRLfQ%3D%3D&expires=1781485860"

          if [ ! -f "logoworld.png" ]; then
            echo "❌ Logo file not found!"
            exit 1
          fi

          LAST_SEQ=0
          SEGMENT_DIR=/tmp/segments
          mkdir -p "$SEGMENT_DIR"

          # ──────────────────────────────────────────
          # Producer: يحمّل segments باستمرار
          # ──────────────────────────────────────────
          producer() {
            while true; do
              PLAYLIST=$(curl -s --max-time 10 "$M3U8_URL" 2>/dev/null)
              if [ -z "$PLAYLIST" ]; then
                sleep 2
                continue
              fi

              mapfile -t TS_URLS < <(echo "$PLAYLIST" | grep -o 'http[^[:space:]]*\.ts' | tr -d '\r')

              for TS_URL in "${TS_URLS[@]}"; do
                TS_URL=$(printf '%s' "$TS_URL" | tr -d '\r\n\t ')
                [[ "$TS_URL" != http* ]] && continue

                SEG_NUM=$(echo "$TS_URL" | grep -o '[0-9]*\.ts$' | grep -o '^[0-9]*')
                [ -z "$SEG_NUM" ] && continue
                [ "$SEG_NUM" -le "$LAST_SEQ" ] 2>/dev/null && continue

                LAST_SEQ=$SEG_NUM
                OUT="$SEGMENT_DIR/${SEG_NUM}.ts"

                echo "⬇ Download segment $SEG_NUM"
                curl -s --max-time 20 -o "$OUT" "$TS_URL"

                # إشارة للـ consumer
                echo "$OUT" >> /tmp/segment_queue.txt
              done

              sleep 1
            done
          }

          # ──────────────────────────────────────────
          # Consumer: يبث segments لـ FFmpeg مستمر
          # ──────────────────────────────────────────
          consumer() {
            # انتظر أول segment
            while [ ! -s /tmp/segment_queue.txt ]; do
              sleep 1
            done

            PROCESSED=0

            while true; do
              # اقرأ سطر واحد من القائمة
              SEG_FILE=$(sed -n "$((PROCESSED + 1))p" /tmp/segment_queue.txt)

              if [ -z "$SEG_FILE" ]; then
                sleep 0.5
                continue
              fi

              # انتظر حتى يكتمل تحميل الملف
              RETRIES=0
              while [ ! -s "$SEG_FILE" ] && [ $RETRIES -lt 20 ]; do
                sleep 0.5
                RETRIES=$((RETRIES + 1))
              done

              if [ ! -s "$SEG_FILE" ]; then
                echo "⚠ Segment missing: $SEG_FILE"
                PROCESSED=$((PROCESSED + 1))
                continue
              fi

              echo "📡 Streaming: $SEG_FILE"
              cat "$SEG_FILE" >> /tmp/main_pipe
              rm -f "$SEG_FILE"

              PROCESSED=$((PROCESSED + 1))
            done
          }

          # ──────────────────────────────────────────
          # إعداد الـ pipe الرئيسي
          # ──────────────────────────────────────────
          rm -f /tmp/main_pipe /tmp/segment_queue.txt
          mkfifo /tmp/main_pipe

          # تشغيل FFmpeg
          ffmpeg \
            -hide_banner \
            -loglevel warning \
            -thread_queue_size 1024 \
            -analyzeduration 0 \
            -probesize 32 \
            -f mpegts \
            -i /tmp/main_pipe \
            -thread_queue_size 512 \
            -i "logoworld.png" \
            -filter_complex \
              "[1:v]scale=115:-1:flags=lanczos[logo];
               [0:v][logo]overlay=30:main_h-overlay_h-30:format=auto,format=yuv420p,setsar=1" \
            -c:v libx264 \
            -preset veryfast \
            -tune zerolatency \
            -profile:v high \
            -crf 20 \
            -b:v 4500k \
            -maxrate 5000k \
            -bufsize 9000k \
            -g 50 \
            -keyint_min 25 \
            -c:a aac \
            -b:a 128k \
            -ar 44100 \
            -ac 2 \
            -f flv \
            "$RTMP_URL" &

          FFMPEG_PID=$!
          echo "🎬 FFmpeg PID: $FFMPEG_PID"

          # تشغيل producer و consumer بالتوازي
          producer &
          PRODUCER_PID=$!

          consumer &
          CONSUMER_PID=$!

          echo "🚀 Stream started!"
          echo "⏱ Producer PID: $PRODUCER_PID | Consumer PID: $CONSUMER_PID"

          # مراقبة FFmpeg - إذا مات أعد كل شيء
          while true; do
            if ! kill -0 $FFMPEG_PID 2>/dev/null; then
              echo "💀 FFmpeg died! Restarting..."
              kill $PRODUCER_PID $CONSUMER_PID 2>/dev/null
              rm -f /tmp/main_pipe /tmp/segment_queue.txt
              rm -f "$SEGMENT_DIR"/*.ts
              exit 1
            fi
            sleep 5
          done
