name: Ok.ru TS Stream - Stable

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg curl
          ffmpeg -version | head -1

      - name: Start Stream
        run: |
          RTMP_URL="rtmp://vsu.okcdn.ru/input/14627505512044_15347102124652_nyms3w6t7u"
          M3U8_URL="http://off28.lynxcontents.click:2086/live/171348492752/5S6HGsea3j/254746.m3u8?data=ixVd16Dy31bufAE7xi0trlZf-D3RV-4rJfyGGIQQA7M5fK_L8c97e4K6rDkXy_UamF3AZ0ezGAqmT6jVBnYskDPHdGw4W9AlDudpS8MKl0QneEDVUSl6hQ6Zg3ri6u9ppg3suI5o4tSV9Z5PhcRLfQ%3D%3D&expires=1781485860"

          if [ ! -f "logoworld.png" ]; then
            echo "❌ Logo file not found!"
            exit 1
          fi

          # فتح pipe - FFmpeg واحد يستقبل كل الـ segments
          mkfifo /tmp/stream_pipe

          # تشغيل FFmpeg في الخلفية يقرأ من الـ pipe
          ffmpeg \
            -hide_banner \
            -loglevel warning \
            -nostdin \
            -re \
            -i /tmp/stream_pipe \
            -i "logoworld.png" \
            -filter_complex \
              "[1:v]scale=115:-1:flags=lanczos[logo];
               [0:v][logo]overlay=30:main_h-overlay_h-30:format=auto,format=yuv420p,setsar=1" \
            -c:v libx264 \
            -preset veryfast \
            -tune zerolatency \
            -profile:v high \
            -crf 20 \
            -b:v 4500k \
            -maxrate 5000k \
            -bufsize 9000k \
            -g 50 \
            -keyint_min 25 \
            -c:a aac \
            -b:a 128k \
            -ar 44100 \
            -ac 2 \
            -f flv \
            "$RTMP_URL" &

          FFMPEG_PID=$!
          echo "🎬 FFmpeg PID: $FFMPEG_PID"

          LAST_SEQ=0

          # دالة لضخ segment للـ pipe
          push_segment() {
            local URL=$1
            echo "📡 Pushing: $URL"
            curl -s --max-time 30 "$URL" > /tmp/stream_pipe
          }

          while kill -0 $FFMPEG_PID 2>/dev/null; do

            PLAYLIST=$(curl -s --max-time 10 "$M3U8_URL" 2>/dev/null)

            if [ -z "$PLAYLIST" ]; then
              echo "⚠ Empty playlist, retrying..."
              sleep 3
              continue
            fi

            mapfile -t TS_URLS < <(echo "$PLAYLIST" | grep -o 'http[^[:space:]]*\.ts' | tr -d '\r')

            if [ ${#TS_URLS[@]} -eq 0 ]; then
              sleep 3
              continue
            fi

            PUSHED=0
            for TS_URL in "${TS_URLS[@]}"; do
              TS_URL=$(printf '%s' "$TS_URL" | tr -d '\r\n\t ')
              if [[ "$TS_URL" != http* ]]; then continue; fi

              SEG_NUM=$(echo "$TS_URL" | grep -o '[0-9]*\.ts$' | grep -o '^[0-9]*')
              if [ -z "$SEG_NUM" ]; then continue; fi
              if [ "$SEG_NUM" -le "$LAST_SEQ" ] 2>/dev/null; then continue; fi

              LAST_SEQ=$SEG_NUM
              push_segment "$TS_URL"
              PUSHED=$((PUSHED + 1))
            done

            if [ $PUSHED -eq 0 ]; then
              sleep 2
            fi

          done

          echo "❌ FFmpeg process ended."
          rm -f /tmp/stream_pipe
          exit 1
