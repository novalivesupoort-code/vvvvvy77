name: Ok.ru TS Stream - Final Stable

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg python3-pip
          pip3 install streamlink --break-system-packages
          ffmpeg -version | head -1
          streamlink --version

      - name: Start Stream
        run: |
          RTMP_URL="rtmp://vsu.okcdn.ru/input/14627505512044_15347102124652_nyms3w6t7u"
          M3U8_URL="http://off28.lynxcontents.click:2086/live/171348492752/5S6HGsea3j/254746.m3u8?data=ixVd16Dy31bufAE7xi0trlZf-D3RV-4rJfyGGIQQA7M5fK_L8c97e4K6rDkXy_UamF3AZ0ezGAqmT6jVBnYskDPHdGw4W9AlDudpS8MKl0QneEDVUSl6hQ6Zg3ri6u9ppg3suI5o4tSV9Z5PhcRLfQ%3D%3D&expires=1781485860"

          if [ ! -f "logoworld.png" ]; then
            echo "❌ Logo file not found!"
            exit 1
          fi

          FAIL_COUNT=0
          MAX_FAILS=10

          while [ $FAIL_COUNT -lt $MAX_FAILS ]; do
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "▶ Starting stream | Attempt: $((FAIL_COUNT + 1))"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            # streamlink يقرأ HLS ويضخه لـ ffmpeg مباشرة
            streamlink \
              --stdout \
              --loglevel warning \
              --hls-live-restart \
              --stream-segment-threads 3 \
              --stream-timeout 60 \
              --retry-streams 5 \
              --retry-max 10 \
              "$M3U8_URL" best \
            | ffmpeg \
              -hide_banner \
              -loglevel warning \
              -nostdin \
              -thread_queue_size 4096 \
              -i pipe:0 \
              -i "logoworld.png" \
              -filter_complex \
                "[1:v]scale=115:-1:flags=lanczos[logo];
                 [0:v][logo]overlay=30:main_h-overlay_h-30:format=auto,format=yuv420p,setsar=1" \
              -c:v libx264 \
              -preset veryfast \
              -tune zerolatency \
              -profile:v high \
              -crf 20 \
              -b:v 4500k \
              -maxrate 5000k \
              -bufsize 9000k \
              -g 50 \
              -keyint_min 25 \
              -c:a aac \
              -b:a 128k \
              -ar 44100 \
              -ac 2 \
              -f flv \
              "$RTMP_URL"

            EXIT_CODE=$?
            echo "⚠ Exited with code: $EXIT_CODE"

            if [ $EXIT_CODE -eq 0 ]; then
              echo "✅ Stream ended cleanly."
              break
            fi

            FAIL_COUNT=$((FAIL_COUNT + 1))
            WAIT=$((FAIL_COUNT * 3))
            [ $WAIT -gt 30 ] && WAIT=30
            echo "🔄 Retry in ${WAIT}s..."
            sleep $WAIT
          done

          [ $FAIL_COUNT -ge $MAX_FAILS ] && echo "❌ Max fails reached." && exit 1
