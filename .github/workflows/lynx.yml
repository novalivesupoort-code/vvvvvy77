name: Lynx Live

on:
  workflow_dispatch:
    inputs:
      m3u8_url:
        description: 'رابط البث M3U8'
        required: true
        type: string
      rtmp_url:
        description: 'رابط RTMP للبث'
        required: true
        type: string
      stream_mode:
        description: 'نوع البث'
        required: true
        type: choice
        options:
          - copy
          - transcode

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg python3-pip
          pip3 install streamlink --break-system-packages -q
          ffmpeg -version | head -1
          streamlink --version

      - name: Start Stream
        run: |
          RTMP_URL="${{ github.event.inputs.rtmp_url }}"
          M3U8_URL="${{ github.event.inputs.m3u8_url }}"
          MODE="${{ github.event.inputs.stream_mode }}"
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"

          echo "🎯 Mode: $MODE"

          if [ ! -f "logoworld.png" ]; then
            echo "❌ Logo file not found!"
            exit 1
          fi

          FAIL_COUNT=0
          MAX_FAILS=10

          while [ $FAIL_COUNT -lt $MAX_FAILS ]; do
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "▶ Starting stream | Attempt: $((FAIL_COUNT + 1))"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            # جرب streamlink أولاً
            echo "🔄 Trying streamlink..."
            streamlink \
              --stdout \
              --loglevel none \
              --hls-live-restart \
              --stream-segment-threads 3 \
              --stream-timeout 60 \
              --retry-streams 1 \
              --retry-max 1 \
              --http-header "User-Agent=$UA" \
              --http-header "Referer=https://www.google.com/" \
              "$M3U8_URL" best 2>/tmp/sl_err | \
            ffmpeg \
              -hide_banner -loglevel warning -nostdin \
              -thread_queue_size 65536 \
              -f mpegts -i pipe:0 \
              $([ "$MODE" = "transcode" ] && echo "\
              -i logoworld.png \
              -filter_complex '[1:v]scale=115:-1:flags=lanczos[logo];[0:v][logo]overlay=30:main_h-overlay_h-30:format=auto,format=yuv420p,setsar=1' \
              -c:v libx264 -preset veryfast -tune zerolatency -profile:v high \
              -crf 20 -b:v 4500k -maxrate 5000k -bufsize 9000k \
              -g 50 -keyint_min 25 \
              -c:a aac -b:a 128k -ar 44100 -ac 2" \
              || echo "-c:v copy -c:a copy") \
              -f flv "$RTMP_URL"

            EXIT_CODE=$?

            # إذا فشل streamlink جرب ffmpeg مباشرة
            if [ $EXIT_CODE -ne 0 ]; then
              echo "⚠ streamlink failed, trying ffmpeg direct..."

              if [ "$MODE" = "copy" ]; then
                ffmpeg \
                  -hide_banner -loglevel warning -nostdin \
                  -user_agent "$UA" \
                  -headers "Referer: https://www.google.com/\r\n" \
                  -reconnect 1 -reconnect_at_eof 1 -reconnect_streamed 1 \
                  -reconnect_delay_max 5 \
                  -thread_queue_size 65536 \
                  -i "$M3U8_URL" \
                  -c:v copy -c:a copy \
                  -f flv "$RTMP_URL"
              else
                ffmpeg \
                  -hide_banner -loglevel warning -nostdin \
                  -user_agent "$UA" \
                  -headers "Referer: https://www.google.com/\r\n" \
                  -reconnect 1 -reconnect_at_eof 1 -reconnect_streamed 1 \
                  -reconnect_delay_max 5 \
                  -thread_queue_size 65536 \
                  -i "$M3U8_URL" \
                  -i "logoworld.png" \
                  -filter_complex \
                    "[1:v]scale=115:-1:flags=lanczos[logo];
                     [0:v][logo]overlay=30:main_h-overlay_h-30:format=auto,format=yuv420p,setsar=1" \
                  -c:v libx264 \
                  -preset veryfast \
                  -tune zerolatency \
                  -profile:v high \
                  -crf 20 \
                  -b:v 4500k \
                  -maxrate 5000k \
                  -bufsize 9000k \
                  -g 50 \
                  -keyint_min 25 \
                  -c:a aac \
                  -b:a 128k \
                  -ar 44100 \
                  -ac 2 \
                  -f flv "$RTMP_URL"
              fi
              EXIT_CODE=$?
            fi

            echo "⚠ Exited with code: $EXIT_CODE"

            if [ $EXIT_CODE -eq 0 ]; then
              echo "✅ Stream ended cleanly."
              break
            fi

            FAIL_COUNT=$((FAIL_COUNT + 1))
            WAIT=$((FAIL_COUNT * 3))
            [ $WAIT -gt 30 ] && WAIT=30
            echo "🔄 Retry in ${WAIT}s..."
            sleep $WAIT
          done

          [ $FAIL_COUNT -ge $MAX_FAILS ] && echo "❌ Max fails reached." && exit 1
