name: Test Source URL - Deep

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: 'Source URL to test'
        required: true
        default: 'https://23370wa.xyz/live/mo3ad11a11/mo3ada11a11/532.m3u8'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Install Tools
        run: |
          sudo apt-get install -y --no-install-recommends ffmpeg curl -qq

      - name: Test 1 - Show Redirect Chain
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🧪 Test 1: Redirect Chain"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          curl -sIL \
            -A "okhttp/4.9.0" \
            "${{ github.event.inputs.source_url }}" | grep -i "location\|http/\|content-type"

      - name: Test 2 - Follow Redirect + Print Final URL
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🧪 Test 2: Final URL after redirect"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          FINAL_URL=$(curl -Ls -o /dev/null \
            -w "%{url_effective}" \
            -A "okhttp/4.9.0" \
            "${{ github.event.inputs.source_url }}")
          echo "🔗 Final URL: $FINAL_URL"
          echo "FINAL_URL=$FINAL_URL" >> $GITHUB_ENV

      - name: Test 3 - Read Final URL Content
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🧪 Test 3: Content of Final URL"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          curl -Ls \
            -A "okhttp/4.9.0" \
            -H "Accept: */*" \
            -H "Connection: keep-alive" \
            "$FINAL_URL" | head -15

      - name: Test 4 - FFmpeg with Final URL
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🧪 Test 4: FFmpeg with Final URL"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          timeout 10 ffmpeg \
            -v warning \
            -user_agent "okhttp/4.9.0" \
            -headers $'Accept: */*\r\nConnection: keep-alive\r\n' \
            -i "$FINAL_URL" \
            -t 5 -f null - 2>&1 | tail -10 && echo "✅ FFmpeg OK" || echo "❌ FFmpeg Failed"

      - name: Test 5 - FFmpeg with Original URL + redirect follow
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🧪 Test 5: FFmpeg Original URL"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          timeout 10 ffmpeg \
            -v warning \
            -user_agent "okhttp/4.9.0" \
            -headers $'Accept: */*\r\nConnection: keep-alive\r\n' \
            -reconnect 1 \
            -reconnect_at_eof 1 \
            -reconnect_streamed 1 \
            -i "${{ github.event.inputs.source_url }}" \
            -t 5 -f null - 2>&1 | tail -10 && echo "✅ FFmpeg OK" || echo "❌ FFmpeg Failed"

      - name: Test 6 - Streamlink
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🧪 Test 6: Streamlink"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          pip install streamlink -q
          timeout 15 streamlink \
            --http-header "User-Agent=okhttp/4.9.0" \
            --http-header "Accept=*/*" \
            "${{ github.event.inputs.source_url }}" best \
            --stdout 2>&1 | head -5 && echo "✅ Streamlink OK" || echo "❌ Streamlink Failed"

      - name: Summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 Final URL was: $FINAL_URL"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
