name: Wor8ld9 Cup Stream

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install FFmpeg (Latest)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1

      - name: Start Stream
        run: |
          RTMP_URL="rtmp://vsu.okcdn.ru/input/14627505512044_15347102124652_nyms3w6t7u"
          SOURCE_URL="http://g.quanviro.cc/at/sh/1322607?"

          if [ ! -f "alwan.png" ]; then
            echo "❌ Logo file not found!"
            exit 1
          fi

          FAIL_COUNT=0
          MAX_FAILS=10

          while [ $FAIL_COUNT -lt $MAX_FAILS ]; do
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "▶ Starting stream | Attempt: $((FAIL_COUNT + 1))"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            ffmpeg \
              -re \
              -reconnect 1 \
              -reconnect_at_eof 1 \
              -reconnect_streamed 1 \
              -reconnect_delay_max 2 \
              -loglevel info \
              -thread_queue_size 32768 \
              -user_agent "VLC/3.0.20 LibVLC/3.0.20" \
              -fflags +genpts+discardcorrupt \
              -err_detect ignore_err \
              -rw_timeout 30000000 \
              -i "$SOURCE_URL" \
              -loop 1 \
              -i "logoworld1.png" \
              -filter_complex \
                "[0:v]scale=1920:1080:flags=fast_bilinear[base];
                 [1:v]scale=90:90:flags=fast_bilinear[logo];
                 [base][logo]overlay=60:H-150[outv]" \
              -map "[outv]" \
              -map "0:a?" \
              -c:v libx264 \
              -preset superfast \
              -tune zerolatency \
              -profile:v high \
              -level 4.1 \
              -x264-params "bframes=0:keyint=60:min-keyint=60:scenecut=0:ref=1" \
              -pix_fmt yuv420p \
              -r 25 \
              -g 60 \
              -b:v 3200k \
              -maxrate 3200k \
              -bufsize 6400k \
              -c:a aac \
              -b:a 120k \
              -ar 44100 \
              -ac 2 \
              -f flv \
              "$RTMP_URL"

            EXIT_CODE=$?
            echo "⚠ FFmpeg exited with code: $EXIT_CODE"

            if [ $EXIT_CODE -eq 0 ]; then
              echo "✅ Stream ended cleanly."
              break
            else
              FAIL_COUNT=$((FAIL_COUNT + 1))
              WAIT=$((FAIL_COUNT * 3))
              [ $WAIT -gt 30 ] && WAIT=30
              echo "🔄 Reconnecting in ${WAIT}s... (Fail $FAIL_COUNT/$MAX_FAILS)"
              sleep $WAIT
            fi
          done

          if [ $FAIL_COUNT -ge $MAX_FAILS ]; then
            echo "❌ Max reconnect attempts reached. Exiting."
            exit 1
          fi