name: Test Source URL

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: 'Source URL to test'
        required: true
        default: 'https://23370wa.xyz/live/mo3ad11a11/mo3ada11a11/532.m3u8'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Test with curl - okhttp
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🧪 Test 1: okhttp"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          curl -s -o /tmp/test1.txt -w "HTTP_CODE:%{http_code}" \
            -H "Accept: */*" \
            -H "Accept-Encoding: gzip, deflate, br" \
            -H "Connection: keep-alive" \
            -A "okhttp/4.9.0" \
            "${{ github.event.inputs.source_url }}" && \
          head -5 /tmp/test1.txt || echo "❌ Failed"

      - name: Test with curl - Televizo
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🧪 Test 2: Televizo"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          curl -s -o /tmp/test2.txt -w "HTTP_CODE:%{http_code}" \
            -H "Accept: */*" \
            -H "Accept-Encoding: gzip, deflate, br" \
            -H "Connection: keep-alive" \
            -A "Televizo/1.8.9.3 (Linux; Android 9)" \
            "${{ github.event.inputs.source_url }}" && \
          head -5 /tmp/test2.txt || echo "❌ Failed"

      - name: Test with curl - VLC
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🧪 Test 3: VLC"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          curl -s -o /tmp/test3.txt -w "HTTP_CODE:%{http_code}" \
            -H "Accept: */*" \
            -H "Accept-Encoding: gzip, deflate, br" \
            -H "Connection: keep-alive" \
            -A "VLC/3.0.20 LibVLC/3.0.20" \
            "${{ github.event.inputs.source_url }}" && \
          head -5 /tmp/test3.txt || echo "❌ Failed"

      - name: Test with curl - No Headers
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🧪 Test 4: No Headers (Plain)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          curl -s -o /tmp/test4.txt -w "HTTP_CODE:%{http_code}" \
            "${{ github.event.inputs.source_url }}" && \
          head -5 /tmp/test4.txt || echo "❌ Failed"

      - name: Summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 Results Summary:"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          for i in 1 2 3 4; do
            if grep -q "EXTM3U" /tmp/test${i}.txt 2>/dev/null; then
              echo "✅ Test ${i}: SUCCESS - M3U8 opened!"
            else
              echo "❌ Test ${i}: FAILED"
            fi
          done
