name: Wor8ld9 Cup Stream

on:
  workflow_dispatch:
    inputs:
      use_logo:
        description: 'Use logo overlay?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: |
          sudo apt-get install -y --no-install-recommends ffmpeg
          ffmpeg -version | head -1

      - name: Start Stream
        run: |
          RTMP_URL="rtmp://vsu.okcdn.ru/input/14627505512044_15347102124652_nyms3w6t7u"
          SOURCE_URL="http://g.mztk02.cc/ayham/ayham/1339213?token=ShN0YQ0JGlhBVEk9ShAWG04kBi5fWQJEC0E8WgsHJDJHQQQJQQQQQ1JHG0EQQQQQQQ0QQQ0UWwVQAVVQUwxNQ0QQQQQQQQxAWUcQAQQQQQQQRhVGQQQQQUcNUFJQDFFQBQQACEgSQQQQRw1BQQQHQQQQQEYcFAQQQQQQQQQQQQQQQQQQQRICDBYJW09EV1xnBQFUBV5SQw5HBkNJRAQQQRMLXEQIXB.RAAQxDEQdMVxpbRghcBwBDGEdUDhAITRMYEwsQdSESFEAGHUMGCEtbVw9GA0ZERUMYR14SOhRcEhVDVFNcAUIaWEFVFU9EVVNAPgdWCl5TAkAMQQQQRANDQBMdEFQQQQQQAQQQEQQQEAJDQQQQQQQQQ0dK"
          USE_LOGO="${{ github.event.inputs.use_logo }}"

          # استخراج Origin و Referer تلقائياً من الرابط
          PROTO=$(echo "$SOURCE_URL" | grep -oP '^https?')
          DOMAIN=$(echo "$SOURCE_URL" | grep -oP '^https?://[^/]+')
          ORIGIN="${DOMAIN}"
          REFERER="${DOMAIN}/"

          echo "🌐 Origin: $ORIGIN"
          echo "🌐 Referer: $REFERER"

          FAIL_COUNT=0
          MAX_FAILS=10

          while [ $FAIL_COUNT -lt $MAX_FAILS ]; do
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "▶ Starting stream | Attempt: $((FAIL_COUNT + 1))"
            echo "🖼 Logo: $USE_LOGO"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            COMMON_INPUT_ARGS=(
              -re
              -reconnect 1
              -reconnect_at_eof 1
              -reconnect_streamed 1
              -reconnect_delay_max 2
              -loglevel warning
              -thread_queue_size 32768
              -user_agent "Mozilla/5.0 (Linux; Android 10) AppleWebKit/537.36"
              -headers $"Origin: ${ORIGIN}\r\nReferer: ${REFERER}\r\n"
              -fflags +genpts+discardcorrupt
              -err_detect ignore_err
              -rw_timeout 30000000
              -i "$SOURCE_URL"
            )

            COMMON_OUTPUT_ARGS=(
              -c:v libx264
              -preset superfast
              -tune zerolatency
              -profile:v high
              -level 4.1
              -x264-params "bframes=0:keyint=60:min-keyint=60:scenecut=0:ref=1"
              -pix_fmt yuv420p
              -r 50
              -g 60
              -b:v 4200k
              -maxrate 4200k
              -bufsize 8400k
              -c:a aac
              -b:a 128k
              -ar 44100
              -ac 2
              -f flv
              "$RTMP_URL"
            )

            if [ "$USE_LOGO" = "true" ]; then
              if [ ! -f "alwan.png" ]; then
                echo "❌ Logo file not found!"
                exit 1
              fi

              ffmpeg \
                "${COMMON_INPUT_ARGS[@]}" \
                -loop 1 \
                -i "alwan.png" \
                -filter_complex \
                  "[0:v]scale=1920:1080:flags=fast_bilinear[base];
                   [1:v]scale=1920:1080:flags=fast_bilinear[logo];
                   [base][logo]overlay=0:0:format=auto[outv]" \
                -map "[outv]" \
                -map "0:a?" \
                "${COMMON_OUTPUT_ARGS[@]}"

            else

              ffmpeg \
                "${COMMON_INPUT_ARGS[@]}" \
                -map 0:v? \
                -map 0:a? \
                "${COMMON_OUTPUT_ARGS[@]}"

            fi

            EXIT_CODE=$?
            echo "⚠ FFmpeg exited with code: $EXIT_CODE"

            if [ $EXIT_CODE -eq 0 ]; then
              echo "✅ Stream ended cleanly."
              break
            else
              FAIL_COUNT=$((FAIL_COUNT + 1))
              WAIT=$((FAIL_COUNT * 3))
              [ $WAIT -gt 30 ] && WAIT=30
              echo "🔄 Reconnecting in ${WAIT}s... (Fail $FAIL_COUNT/$MAX_FAILS)"
              sleep $WAIT
            fi
          done

          if [ $FAIL_COUNT -ge $MAX_FAILS ]; then
            echo "❌ Max reconnect attempts reached. Exiting."
            exit 1
          fi
